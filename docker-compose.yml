services:
  openclaw-skill-admin:
    build: .
    container_name: openclaw-skill-admin
    ports:
      - "${SKILL_ADMIN_PORT:-5057}:5057"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENCLAW_WORKSPACE: /data/openclaw-workspace
      PORTAL_DB: /data/state/portal.db
      CLAWHUB_BIN: /usr/local/bin/clawhub
    volumes:
      - ${OPENCLAW_WORKSPACE_HOST}:/data/openclaw-workspace
      - ./data:/data/state
    restart: unless-stopped
