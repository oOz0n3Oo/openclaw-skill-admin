<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OpenClaw Skill Admin{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link href="{{ url_for('static', filename='app.css') }}" rel="stylesheet">
  </head>
  <body class="portal-body">
    <nav class="navbar navbar-expand-lg navbar-dark portal-nav border-bottom border-secondary-subtle">
      <div class="container-fluid px-4">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard') }}">OpenClaw Skill Admin</a>
        <div class="d-flex align-items-center gap-3">
          {% if current_user %}
          <span class="small text-secondary">{{ current_user }}</span>
          <form method="post" action="{{ url_for('logout') }}">
            <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
          </form>
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container-fluid px-4 py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="mb-4">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} mb-2" role="alert">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
